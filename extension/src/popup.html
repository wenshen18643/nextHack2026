<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sentinel</title>
    <style>
      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif;
        color: #0f172a;
        background: #f8fafc;
      }
      h1 { font-size: 15px; margin: 0 0 2px; }
      p.sub { margin: 0 0 14px; font-size: 12px; color: #64748b; }
      label { display: block; font-size: 12px; font-weight: 600; margin-top: 10px; }
      input {
        width: 100%;
        box-sizing: border-box;
        margin-top: 4px;
        padding: 7px 9px;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        font-size: 13px;
      }
      button {
        margin-top: 12px;
        width: 100%;
        border: 0;
        border-radius: 8px;
        background: #f97316;
        color: #fff;
        padding: 9px;
        font-weight: 600;
        font-size: 13px;
        cursor: pointer;
      }
      h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; margin: 18px 0 8px; }
      .row { display: flex; align-items: center; justify-content: space-between; gap: 8px; padding: 7px 0; border-top: 1px solid #e2e8f0; font-size: 12px; }
      .tag { font-weight: 700; padding: 2px 8px; border-radius: 999px; background: #f1f5f9; }
      .PASS { background: #dcfce7; color: #166534; }
      .INSPECT { background: #fef3c7; color: #92400e; }
      .QUARANTINE { background: #ffedd5; color: #c2410c; }
      .DENY { background: #ffe4e6; color: #be123c; }
      .empty { font-size: 12px; color: #94a3b8; }
      .saved { font-size: 12px; color: #16a34a; margin-top: 6px; min-height: 14px; }
    </style>
  </head>
  <body>
    <h1>Sentinel Firewall</h1>
    <p class="sub">Screens web bank &amp; e-wallet transfers with AI before they confirm.</p>

    <label for="api">Sentinel API base</label>
    <input id="api" type="url" placeholder="http://localhost:3000" />

    <label for="user">Demo account</label>
    <input id="user" type="text" placeholder="user_aisha" />

    <button id="save">Save settings</button>
    <div id="saved" class="saved"></div>

    <h2>Recent verdicts</h2>
    <div id="history"><p class="empty">No transfers screened yet.</p></div>

    <script src="popup.js"></script>
  </body>
</html>
