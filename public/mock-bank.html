<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>MockBank Online — Transfer</title>
    <style>
      :root { font-family: ui-sans-serif, system-ui, "Segoe UI", sans-serif; }
      body { margin: 0; background: #eef2f7; color: #0f172a; }
      header { background: #0a3d62; color: #fff; padding: 16px 24px; font-weight: 700; }
      main { max-width: 460px; margin: 32px auto; background: #fff; border-radius: 14px; padding: 24px; box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08); }
      h1 { font-size: 18px; margin: 0 0 4px; }
      p.sub { margin: 0 0 18px; color: #64748b; font-size: 13px; }
      label { display: block; font-size: 13px; font-weight: 600; margin-top: 14px; }
      input { width: 100%; box-sizing: border-box; margin-top: 5px; padding: 10px 12px; border: 1px solid #cbd5e1; border-radius: 9px; font-size: 14px; }
      button.send { margin-top: 22px; width: 100%; border: 0; border-radius: 10px; background: #0a3d62; color: #fff; padding: 12px; font-weight: 700; font-size: 15px; cursor: pointer; }
      .scenarios { margin-top: 22px; }
      .scenarios h2 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: #64748b; }
      .scenarios button { display: block; width: 100%; text-align: left; margin-top: 8px; border: 1px solid #e2e8f0; background: #f8fafc; border-radius: 9px; padding: 9px 12px; font-size: 13px; cursor: pointer; }
      .ok { margin-top: 16px; padding: 12px; border-radius: 9px; background: #dcfce7; color: #166534; font-size: 14px; font-weight: 600; display: none; }
    </style>
  </head>
  <body>
    <header>MockBank Online</header>
    <main>
      <h1>Transfer money</h1>
      <p class="sub">Sentinel extension screens this transfer before it is sent.</p>

      <form id="transfer-form">
        <label for="payee">Recipient</label>
        <input id="payee" name="payee" value="payee_grocer" required />

        <label for="amount">Amount (RM)</label>
        <input id="amount" name="amount" type="number" value="200" min="1" step="0.01" required />

        <button class="send" type="submit" data-sentinel-confirm>Send Transfer</button>
      </form>

      <div id="done" class="ok">✅ Transfer sent successfully.</div>

      <div class="scenarios">
        <h2>Try a scenario</h2>
        <button type="button" data-payee="payee_grocer" data-amount="200">Normal grocery (safe)</button>
        <button type="button" data-payee="payee_new_friend" data-amount="260">Late-night new friend (AI)</button>
        <button type="button" data-payee="payee_unknown_crypto" data-amount="4800">Authorized-push scam</button>
      </div>
    </main>

    <script>
      const payee = document.getElementById("payee");
      const amount = document.getElementById("amount");
      const done = document.getElementById("done");

      document.querySelectorAll(".scenarios button").forEach((button) => {
        button.addEventListener("click", () => {
          payee.value = button.dataset.payee;
          amount.value = button.dataset.amount;
          done.style.display = "none";
        });
      });

      document.getElementById("transfer-form").addEventListener("submit", (event) => {
        event.preventDefault();
        done.style.display = "block";
      });
    </script>
  </body>
</html>
